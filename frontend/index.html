<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="icon" type="image/x-icon" href="assets/favicon.ico">
<link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png">
<title>Tripzy</title>
<style>
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface2: #273548;
    --border: #334155;
    --primary: #3b82f6;
    --primary-dark: #2563eb;
    --accent: #f59e0b;
    --text: #f1f5f9;
    --text-muted: #94a3b8;
    --success: #10b981;
    --warning: #f59e0b;
    --error: #ef4444;
    --user-bubble: #3b82f6;
    --ai-bubble: #1e293b;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  header .logo {
    height: 36px;
    width: auto;
  }
  header h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  header .subtitle {
    font-size: 12px;
    color: var(--text-muted);
    margin-left: auto;
  }
  header button.reset-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 6px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
  }
  header button.reset-btn:hover {
    border-color: var(--primary);
    color: var(--primary);
  }

  /* ── MAIN LAYOUT ── */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── LEFT SIDEBAR — Trip Summary ── */
  .sidebar {
    width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 16px;
    gap: 12px;
    overflow-y: auto;
    flex-shrink: 0;
  }

  .sidebar h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    margin-bottom: 4px;
  }

  .trip-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
  }

  .trip-field {
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
  }
  .trip-field:last-child { border-bottom: none; }
  .trip-field .label {
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .trip-field .value {
    font-size: 13px;
    font-weight: 500;
  }
  .trip-field .value.empty { color: var(--text-muted); font-style: italic; }
  .trip-field .value.filled { color: var(--text); }

  /* ── CHAT AREA ── */
  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  /* Message row */
  .msg-row {
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .msg-row.user { flex-direction: row-reverse; }

  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }
  .avatar.ai { background: var(--primary); }
  .avatar.user { background: var(--accent); }

  .bubble {
    max-width: 72%;
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.6;
  }
  .msg-row.user .bubble {
    background: var(--user-bubble);
    border-top-right-radius: 4px;
  }
  .msg-row.ai .bubble {
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
  }

  /* Markdown-ish styles inside bubble */
  .bubble strong { font-weight: 700; }
  .bubble em { font-style: italic; }
  .bubble code {
    background: rgba(255,255,255,0.1);
    padding: 1px 5px;
    border-radius: 4px;
    font-family: monospace;
    font-size: 13px;
  }
  .bubble pre {
    background: rgba(0,0,0,0.3);
    padding: 10px;
    border-radius: 8px;
    overflow-x: auto;
    margin: 8px 0;
  }
  .bubble h1, .bubble h2, .bubble h3 {
    margin: 10px 0 4px;
    font-weight: 700;
  }
  .bubble h1 { font-size: 18px; }
  .bubble h2 { font-size: 16px; color: var(--primary); }
  .bubble h3 { font-size: 14px; color: var(--accent); }
  .bubble ul, .bubble ol { padding-left: 20px; margin: 6px 0; }
  .bubble li { margin: 2px 0; }
  .bubble p { margin: 4px 0; }
  .bubble hr { border-color: var(--border); margin: 10px 0; }

  /* Typing indicator */
  .typing-indicator {
    display: flex;
    gap: 4px;
    padding: 8px 4px;
    align-items: center;
  }
  .typing-indicator span {
    width: 6px;
    height: 6px;
    background: var(--text-muted);
    border-radius: 50%;
    animation: bounce 1.4s infinite ease-in-out;
  }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-8px); }
  }

  /* Status message */
  .status-msg {
    text-align: center;
    font-size: 13px;
    color: var(--text-muted);
    padding: 6px 12px;
    background: var(--surface2);
    border-radius: 20px;
    margin: 0 auto;
    border: 1px solid var(--border);
  }

  /* Confirm prompt */
  .confirm-prompt {
    background: linear-gradient(135deg, #1e3a5f, #1e293b);
    border: 1px solid var(--primary);
    border-radius: var(--radius);
    padding: 16px;
    margin: 4px 0;
  }
  .confirm-prompt p { margin-bottom: 12px; font-size: 14px; }
  .confirm-btn {
    background: var(--primary);
    color: white;
    border: none;
    padding: 10px 24px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    transition: background 0.2s;
  }
  .confirm-btn:hover { background: var(--primary-dark); }

  /* Booking confirmation card */
  .booking-card {
    background: linear-gradient(135deg, #064e3b, #1e293b);
    border: 1px solid var(--success);
    border-radius: var(--radius);
    padding: 16px;
    margin: 4px 0;
  }
  .booking-card h3 {
    color: var(--success);
    font-size: 16px;
    margin-bottom: 12px;
  }
  .booking-detail {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px solid rgba(16, 185, 129, 0.2);
    font-size: 13px;
  }
  .booking-detail:last-child { border-bottom: none; }
  .booking-detail .key { color: var(--text-muted); }
  .booking-detail .val { font-weight: 600; font-family: monospace; letter-spacing: 1px; }

  /* ── RIGHT SIDEBAR — Agent Status ── */
  .agents-panel {
    width: 220px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 16px;
    gap: 8px;
    overflow-y: auto;
    flex-shrink: 0;
  }

  .agents-panel h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    margin-bottom: 4px;
  }

  .agent-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: border-color 0.3s, background 0.3s;
  }
  .agent-card.idle { opacity: 0.5; }
  .agent-card.running {
    border-color: var(--primary);
    background: rgba(59, 130, 246, 0.08);
    animation: pulse-border 1.5s infinite;
  }
  .agent-card.done {
    border-color: var(--success);
    background: rgba(16, 185, 129, 0.06);
    opacity: 1;
  }
  .agent-card.error {
    border-color: var(--error);
    background: rgba(239, 68, 68, 0.06);
    opacity: 1;
  }
  @keyframes pulse-border {
    0%, 100% { box-shadow: 0 0 0 0 rgba(59,130,246,0.4); }
    50% { box-shadow: 0 0 0 4px rgba(59,130,246,0); }
  }

  .agent-icon { font-size: 18px; flex-shrink: 0; }
  .agent-info { flex: 1; min-width: 0; }
  .agent-name { font-size: 12px; font-weight: 600; }
  .agent-status-text { font-size: 11px; color: var(--text-muted); }
  .agent-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--border);
    flex-shrink: 0;
  }
  .agent-card.running .agent-dot {
    background: var(--primary);
    animation: blink 1s infinite;
  }
  .agent-card.done .agent-dot { background: var(--success); }
  .agent-card.error .agent-dot { background: var(--error); }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  /* Result summary in agents panel */
  .agent-result-summary {
    font-size: 10px;
    color: var(--success);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── INPUT BAR ── */
  .input-bar {
    display: flex;
    gap: 10px;
    padding: 14px 20px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  textarea {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    resize: none;
    min-height: 44px;
    max-height: 120px;
    line-height: 1.5;
    transition: border-color 0.2s;
    outline: none;
  }
  textarea:focus { border-color: var(--primary); }
  textarea::placeholder { color: var(--text-muted); }

  .send-btn {
    background: var(--primary);
    border: none;
    color: white;
    width: 44px;
    height: 44px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, transform 0.1s;
    flex-shrink: 0;
  }
  .send-btn:hover { background: var(--primary-dark); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { background: var(--border); cursor: not-allowed; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <img src="assets/logo.png" class="logo" alt="Tripzy logo">
  <h1>Tripzy</h1><h5>Your AI Travel Agent</h5>
  <span class="subtitle"></span>
  <button class="reset-btn" onclick="resetSession()">↺ New Trip</button>
</header>

<!-- MAIN -->
<div class="layout">

  <!-- LEFT: Trip Summary -->
  <aside class="sidebar">
    <h3>Trip Summary</h3>
    <div class="trip-card" id="trip-card">
      <div class="trip-field"><span class="label">Destination</span><span class="value empty" id="f-dest">Not set</span></div>
      <div class="trip-field"><span class="label">From</span><span class="value empty" id="f-origin">Not set</span></div>
      <div class="trip-field"><span class="label">Dates</span><span class="value empty" id="f-dates">Not set</span></div>
      <div class="trip-field"><span class="label">Travelers</span><span class="value filled" id="f-travelers">1 adult</span></div>
      <div class="trip-field"><span class="label">Budget</span><span class="value empty" id="f-budget">Not set</span></div>
      <div class="trip-field"><span class="label">Purpose</span><span class="value empty" id="f-purpose">Not set</span></div>
      <div class="trip-field"><span class="label">Hotel</span><span class="value empty" id="f-hotel">Not set</span></div>
    </div>
  </aside>

  <!-- CHAT -->
  <main class="chat-area">
    <div class="messages" id="messages"></div>

    <div class="input-bar">
      <textarea
        id="input"
        placeholder="Tell me about your dream trip..."
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()" title="Send">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </main>

  <!-- RIGHT: Agents Panel -->
  <aside class="agents-panel">
    <h3>AI Agents</h3>

    <div class="agent-card idle" id="agent-requirements">
      <span class="agent-icon">📋</span>
      <div class="agent-info">
        <div class="agent-name">Requirement Checker</div>
        <div class="agent-status-text" id="req-status">Listening...</div>
      </div>
      <div class="agent-dot"></div>
    </div>

    <div class="agent-card idle" id="agent-flight">
      <span class="agent-icon">✈️</span>
      <div class="agent-info">
        <div class="agent-name">Flight Agent</div>
        <div class="agent-status-text" id="flight-status">Waiting</div>
        <div class="agent-result-summary" id="flight-summary" style="display:none"></div>
      </div>
      <div class="agent-dot"></div>
    </div>

    <div class="agent-card idle" id="agent-hotel">
      <span class="agent-icon">🏨</span>
      <div class="agent-info">
        <div class="agent-name">Hotel Agent</div>
        <div class="agent-status-text" id="hotel-status">Waiting</div>
        <div class="agent-result-summary" id="hotel-summary" style="display:none"></div>
      </div>
      <div class="agent-dot"></div>
    </div>

    <div class="agent-card idle" id="agent-climate">
      <span class="agent-icon">🌤️</span>
      <div class="agent-info">
        <div class="agent-name">Climate Agent</div>
        <div class="agent-status-text" id="climate-status">Waiting</div>
        <div class="agent-result-summary" id="climate-summary" style="display:none"></div>
      </div>
      <div class="agent-dot"></div>
    </div>

    <div class="agent-card idle" id="agent-planning">
      <span class="agent-icon">🗺️</span>
      <div class="agent-info">
        <div class="agent-name">Planning Agent</div>
        <div class="agent-status-text" id="planning-status">Waiting</div>
      </div>
      <div class="agent-dot"></div>
    </div>
  </aside>

</div>

<script>
// ── STATE ──────────────────────────────────────────────────────────────────
const API = 'http://localhost:8000';
let sessionId = null;
let streaming = false;
let currentBubble = null;
let currentBubbleText = '';

// ── INIT ───────────────────────────────────────────────────────────────────
async function init() {
  const res = await fetch(`${API}/session`, { method: 'POST' });
  const data = await res.json();
  sessionId = data.session_id;
  addWelcomeMessage();
}

function addWelcomeMessage() {
  addAIMessage(
    "Hello! I'm your AI Travel Agent powered by a multi-agent system. 🌍\n\n" +
    "Tell me about your dream trip — where would you like to go, and when? " +
    "I'll search flights, hotels, check the weather, and create a complete itinerary for you!\n\n" +
    "*Example: \"I want to take a family trip to Bali in June for 7 days, budget $3000\"*"
  );
}

// ── SEND MESSAGE ───────────────────────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('input');
  const message = input.value.trim();
  if (!message || streaming) return;

  input.value = '';
  autoResize(input);

  addUserMessage(message);
  setAgentStatus('requirements', 'running', 'Extracting info...');

  streaming = true;
  document.getElementById('send-btn').disabled = true;

  // Start a new AI bubble for streaming
  currentBubble = null;
  currentBubbleText = '';

  const res = await fetch(`${API}/chat/${sessionId}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message }),
  });

  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;

    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split('\n');
    buffer = lines.pop(); // keep incomplete line

    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const raw = line.slice(6).trim();
      if (raw === '[DONE]') {
        finishStreaming();
        break;
      }
      try {
        handleEvent(JSON.parse(raw));
      } catch (e) {
        // ignore parse errors
      }
    }
  }
}

// ── EVENT HANDLER ──────────────────────────────────────────────────────────
function handleEvent(event) {
  switch (event.type) {

    case 'text': {
      if (!currentBubble) {
        currentBubble = createStreamingBubble();
      }
      currentBubbleText += event.content;
      currentBubble.innerHTML = renderMarkdown(currentBubbleText);
      scrollToBottom();
      break;
    }

    case 'status': {
      addStatusMessage(event.message);
      setAgentStatus('requirements', 'done', 'Done');
      break;
    }

    case 'dto_update': {
      updateTripSummary(event.data);
      setAgentStatus('requirements', 'done', 'DTO updated');
      break;
    }

    case 'agent_status': {
      const statusMap = { flight: 'flight', hotel: 'hotel', climate: 'climate', planning: 'planning' };
      if (statusMap[event.agent]) {
        const labelMap = {
          flight: 'Searching flights...',
          hotel: 'Searching hotels...',
          climate: 'Analyzing weather...',
          planning: 'Creating itinerary...',
        };
        setAgentStatus(event.agent, event.status, labelMap[event.agent] || 'Running...');
      }
      break;
    }

    case 'agent_result': {
      const { agent, status, data } = event;
      if (agent === 'flight' && data && data.top_flights) {
        const f = data.top_flights[0];
        setAgentStatus('flight', 'done', 'Done', f ? `${f.airline} · $${f.price_per_person}/person` : null);
      } else if (agent === 'hotel' && data && data.top_hotels) {
        const h = data.top_hotels[0];
        setAgentStatus('hotel', 'done', 'Done', h ? `${h.name} · $${h.price_per_night}/night` : null);
      } else if (agent === 'climate' && data && data.overall_verdict) {
        setAgentStatus('climate', 'done', 'Done', data.overall_verdict);
      } else if (agent === 'planning') {
        setAgentStatus('planning', 'done', 'Plan ready');
      } else {
        setAgentStatus(agent, status === 'done' ? 'done' : 'error', status);
      }
      break;
    }

    case 'plan_start': {
      // Ensure we create a new bubble for the plan
      if (currentBubble) {
        currentBubble = null;
        currentBubbleText = '';
      }
      break;
    }

    case 'plan_end': {
      if (currentBubble) {
        currentBubble = null;
        currentBubbleText = '';
      }
      break;
    }

    case 'confirm_prompt': {
      addConfirmPrompt(event.message);
      break;
    }

    case 'booking_confirmation': {
      addBookingCard(event.data);
      break;
    }

    case 'error': {
      addStatusMessage('⚠️ ' + (event.message || 'An error occurred'));
      break;
    }
  }
}

function finishStreaming() {
  streaming = false;
  currentBubble = null;
  currentBubbleText = '';
  document.getElementById('send-btn').disabled = false;
}

// ── UI HELPERS ─────────────────────────────────────────────────────────────
function addUserMessage(text) {
  const row = document.createElement('div');
  row.className = 'msg-row user';
  row.innerHTML = `
    <div class="avatar user">👤</div>
    <div class="bubble">${escapeHtml(text)}</div>
  `;
  document.getElementById('messages').appendChild(row);
  scrollToBottom();
}

function addAIMessage(text) {
  const row = document.createElement('div');
  row.className = 'msg-row ai';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = renderMarkdown(text);
  row.innerHTML = `<div class="avatar ai">🤖</div>`;
  row.appendChild(bubble);
  document.getElementById('messages').appendChild(row);
  scrollToBottom();
  return bubble;
}

function createStreamingBubble() {
  const row = document.createElement('div');
  row.className = 'msg-row ai';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
  row.innerHTML = `<div class="avatar ai">🤖</div>`;
  row.appendChild(bubble);
  document.getElementById('messages').appendChild(row);
  scrollToBottom();
  return bubble;
}

function addStatusMessage(text) {
  const el = document.createElement('div');
  el.className = 'status-msg';
  el.innerHTML = renderMarkdown(text);
  document.getElementById('messages').appendChild(el);
  scrollToBottom();
}

function addConfirmPrompt(text) {
  const row = document.createElement('div');
  row.className = 'msg-row ai';
  row.innerHTML = `
    <div class="avatar ai">🤖</div>
    <div class="bubble">
      <div class="confirm-prompt">
        <p>${renderMarkdown(text)}</p>
        <button class="confirm-btn" onclick="quickConfirm()">✅ Yes, Book My Trip!</button>
      </div>
    </div>
  `;
  document.getElementById('messages').appendChild(row);
  scrollToBottom();
}

function addBookingCard(data) {
  const row = document.createElement('div');
  row.className = 'msg-row ai';
  row.innerHTML = `
    <div class="avatar ai">🤖</div>
    <div class="bubble">
      <div class="booking-card">
        <h3>🎉 Booking Confirmed!</h3>
        <div class="booking-detail"><span class="key">Destination</span><span class="val">${data.destination || '—'}</span></div>
        <div class="booking-detail"><span class="key">Dates</span><span class="val">${data.dates || '—'}</span></div>
        <div class="booking-detail"><span class="key">Travelers</span><span class="val">${data.travelers || '—'}</span></div>
        <div class="booking-detail"><span class="key">Flight Ref</span><span class="val">${data.flight?.booking_reference || '—'}</span></div>
        <div class="booking-detail"><span class="key">Hotel Ref</span><span class="val">${data.hotel?.booking_reference || '—'}</span></div>
      </div>
    </div>
  `;
  document.getElementById('messages').appendChild(row);
  scrollToBottom();
}

function quickConfirm() {
  document.getElementById('input').value = 'Yes, book it!';
  sendMessage();
}

// ── AGENT STATUS ───────────────────────────────────────────────────────────
function setAgentStatus(agent, state, statusText, summary = null) {
  const card = document.getElementById(`agent-${agent}`);
  const statusEl = document.getElementById(`${agent}-status`);
  const summaryEl = document.getElementById(`${agent}-summary`);

  if (!card) return;
  card.className = `agent-card ${state}`;
  if (statusEl) statusEl.textContent = statusText;
  if (summaryEl && summary) {
    summaryEl.textContent = summary;
    summaryEl.style.display = 'block';
  }
}

// ── TRIP SUMMARY SIDEBAR ───────────────────────────────────────────────────
function updateTripSummary(dto) {
  const set = (id, val, fallback = 'Not set') => {
    const el = document.getElementById(id);
    if (!el) return;
    if (val) {
      el.textContent = val;
      el.className = 'value filled';
    } else {
      el.textContent = fallback;
      el.className = 'value empty';
    }
  };

  set('f-dest', dto.destination);
  set('f-origin', dto.origin);

  if (dto.start_date && dto.end_date) {
    set('f-dates', `${dto.start_date} → ${dto.end_date}`);
  } else if (dto.start_date) {
    set('f-dates', `From ${dto.start_date}`);
  } else {
    set('f-dates', null);
  }

  const t = dto.travelers;
  const travStr = `${t.adults} adult${t.adults !== 1 ? 's' : ''}` +
    (t.kids > 0 ? `, ${t.kids} kid${t.kids !== 1 ? 's' : ''}` : '');
  set('f-travelers', travStr, '1 adult');

  if (dto.budget?.total) {
    set('f-budget', `${dto.budget.total.toLocaleString()} ${dto.budget.currency || 'USD'}`);
  } else {
    set('f-budget', null);
  }

  set('f-purpose', dto.purpose ? dto.purpose.charAt(0).toUpperCase() + dto.purpose.slice(1) : null);
  set('f-hotel', dto.preferences?.hotel_type
    ? dto.preferences.hotel_type.charAt(0).toUpperCase() + dto.preferences.hotel_type.slice(1)
    : null);
}

// ── RESET ──────────────────────────────────────────────────────────────────
async function resetSession() {
  if (sessionId) {
    await fetch(`${API}/session/${sessionId}`, { method: 'DELETE' }).catch(() => {});
  }
  sessionId = null;
  streaming = false;
  currentBubble = null;
  currentBubbleText = '';

  document.getElementById('messages').innerHTML = '';
  document.getElementById('input').value = '';

  // Reset agents
  ['requirements', 'flight', 'hotel', 'climate', 'planning'].forEach(a => {
    setAgentStatus(a, 'idle', a === 'requirements' ? 'Listening...' : 'Waiting');
    const sum = document.getElementById(`${a}-summary`);
    if (sum) { sum.textContent = ''; sum.style.display = 'none'; }
  });

  // Reset trip summary
  ['f-dest','f-origin','f-dates','f-budget','f-purpose','f-hotel'].forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.textContent = 'Not set'; el.className = 'value empty'; }
  });
  const travelers = document.getElementById('f-travelers');
  if (travelers) { travelers.textContent = '1 adult'; travelers.className = 'value filled'; }

  await init();
}

// ── MARKDOWN RENDERER (lightweight) ───────────────────────────────────────
function renderMarkdown(text) {
  if (!text) return '';
  let html = escapeHtml(text);

  // Bold
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Italic
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // H1
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // H2
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  // H3
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  // HR
  html = html.replace(/^---$/gm, '<hr>');
  // Bullet lists
  html = html.replace(/^[-•] (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>\n?)+/g, m => `<ul>${m}</ul>`);
  // Numbered lists
  html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  // Paragraphs (double newline)
  html = html.replace(/\n\n/g, '</p><p>');
  // Single newlines
  html = html.replace(/\n/g, '<br>');

  return `<p>${html}</p>`;
}

function escapeHtml(text) {
  return text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── INPUT HELPERS ──────────────────────────────────────────────────────────
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function scrollToBottom() {
  const el = document.getElementById('messages');
  el.scrollTop = el.scrollHeight;
}

// ── START ──────────────────────────────────────────────────────────────────
init();
</script>
